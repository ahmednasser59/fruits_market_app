name: fruits_hub
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  bloc: ^9.0.0
  cloud_firestore: ^6.5.0
  crypto: ^3.0.7
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  dots_indicator: ^4.0.1
  equatable: ^2.0.8
  firebase_auth: ^6.5.2
  firebase_core: ^4.10.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_facebook_auth: ^7.1.6
  flutter_localizations:
    sdk: flutter
  flutter_paypal_payment: ^1.0.8
  flutter_svg: ^2.3.0
  flutter_svg_provider: ^1.0.7
  get_it: ^9.2.1
  google_sign_in: ^6.2.1
  intl: ^0.20.2
  meta: ^1.16.0
  modal_progress_hud_nsn: ^0.5.1
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  sign_in_with_apple: ^7.0.1
  skeletonizer: ^2.1.3
  svg_flutter: ^0.0.1
  uuid: ^4.5.3

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/vuesax/bold/
    - assets/images/vuesax/outline/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700

  generate: true
